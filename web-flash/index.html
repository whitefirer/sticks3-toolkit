<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>StickS3 Toolkit</title>
<style>
:root {
  --bg: #0a0a10; --panel: #13131f; --card: #1a1a2c; --border: #1f1f38;
  --ink: #e4e4ee; --muted: #7c7c94; --accent: #e94560; --accent-glow: #ff6b81;
  --green: #3ecf8e; --log-bg: #06060c;
  font-family: Inter, system-ui, -apple-system, sans-serif;
  color: var(--ink); background: var(--bg);
}
*{box-sizing:border-box;margin:0;padding:0}
body{-webkit-font-smoothing:antialiased}

.topbar{position:sticky;top:0;z-index:10;padding:14px clamp(20px,5vw,64px);
  border-bottom:1px solid var(--border);background:#0a0a10e0;backdrop-filter:blur(12px)}
.topbar-inner{width:min(100%,1280px);margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:17px}
.brand-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent-glow)}
.topbar nav{display:flex;gap:12px;align-items:center;font-size:13px}
.topbar nav a{color:var(--muted);text-decoration:none}
.topbar nav a:hover{color:var(--ink)}
.lang-btn{background:var(--card);color:var(--muted);border:1px solid var(--border);
  border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;font:inherit}
.lang-btn:hover{color:var(--ink);border-color:var(--accent)}

.section-inner{width:min(100%,1280px);margin:0 auto;padding:clamp(20px,4vw,40px)}

.hero{padding:clamp(20px,3vw,30px) 0 clamp(10px,2vw,20px);text-align:center}
.hero h1{font-size:clamp(22px,3vw,36px);letter-spacing:-.5px}
.hero h1 em{font-style:normal;color:var(--accent)}

.usage{padding-bottom:clamp(20px,3vw,30px)}
.usage h2{font-size:15px;color:var(--accent);margin-bottom:10px}
.usage dl{display:grid;grid-template-columns:auto 1fr;gap:4px 16px;font-size:13px;line-height:1.6}
.usage dt{color:var(--accent);font-weight:600;white-space:nowrap}
.usage dd{color:var(--muted)}

.panels{display:grid;grid-template-columns:minmax(360px,1fr) minmax(360px,1fr);gap:clamp(20px,3vw,32px);padding-bottom:clamp(40px,6vw,80px)}
.panel-card{padding:clamp(16px,3vw,24px);border:1px solid var(--border);border-radius:10px;background:var(--card)}
.panel-card h2{font-size:15px;color:var(--accent);margin-bottom:12px}

button{font:inherit;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
  min-height:34px;padding:0 14px;border-radius:6px;font-size:13px;font-weight:600;
  border:1px solid var(--border);color:var(--ink);background:var(--card);
  transition:background .15s,border-color .15s}
button:hover:not(:disabled){border-color:var(--accent)}
button.primary{color:#fff;background:var(--accent);border-color:var(--accent)}
button.primary:hover:not(:disabled){background:var(--accent-glow)}
button.secondary{color:var(--ink);background:#252538;border:1px solid #3a3a55}
button.secondary:hover:not(:disabled){background:#303050;border-color:#555}
button:disabled{opacity:.4;cursor:not-allowed}
button.diag{color:var(--accent);border-color:var(--accent);background:transparent}
button.diag:hover:not(:disabled){background:var(--accent);color:#fff}

.fw-row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.fw-row input{flex:1;background:var(--bg);color:var(--ink);border:1px solid var(--border);
  border-radius:6px;padding:6px 10px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px}
.fw-row input::placeholder{color:var(--muted)}
.fw-row .file-btn{flex-shrink:0}

.progress-track{width:100%;height:6px;margin:10px 0;overflow:hidden;border-radius:99px;background:#2a2a3e}
.progress-track .fill{display:block;width:0;height:100%;border-radius:inherit;background:var(--accent);transition:width .3s ease}

.diag-section{margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.diag-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.diag-row button{flex-shrink:0}
.diag-sha{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:10px;color:var(--muted);
  word-break:break-all;padding:6px 8px;background:var(--bg);border-radius:4px;margin-top:4px;line-height:1.4}

.flash-log{min-height:100px;max-height:180px;margin-bottom:10px;padding:10px;overflow:auto;
  border:1px solid var(--border);border-radius:8px;color:#a0b8d0;background:var(--log-bg);
  font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:11px;line-height:1.5}
.flash-log .ok{color:var(--green)}.flash-log .err{color:var(--accent)}

.serial-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.serial-controls select{background:var(--card);color:var(--ink);border:1px solid var(--border);
  border-radius:6px;padding:5px 6px;font-size:11px;font-family:inherit}
.serial-term{min-height:320px;max-height:440px;padding:10px;overflow:auto;
  border:1px solid var(--border);border-radius:8px;color:#a0b8d0;background:var(--log-bg);
  font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:11px;line-height:1.5;
  white-space:pre-wrap;word-break:break-all}
.serial-input-line{display:flex;gap:8px;margin-top:10px}
.serial-input-line input{flex:1;background:var(--card);color:var(--ink);
  border:1px solid var(--border);border-radius:6px;padding:6px 10px;
  font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:13px}

footer{padding:16px 0;border-top:1px solid var(--border);color:var(--muted);font-size:12px;text-align:center}
footer a{color:var(--accent);text-decoration:none}

@media(max-width:860px){.panels{grid-template-columns:1fr}}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand"><span class="brand-dot"></span>StickS3 Toolkit</div>
    <nav>
      <a href="https://github.com/whitefirer/sticks3-toolkit" target="_blank" rel="noopener noreferrer">GitHub</a>
      <a href="https://whitefirer.org" target="_blank" rel="noopener noreferrer">Blog</a>
      <button class="lang-btn" onclick="toggleLang()" id="langBtn">EN</button>
    </nav>
  </div>
</header>

<main>
  <section class="hero">
    <div class="section-inner">
      <h1 data-t="hero">ESP32-S3 <em data-t="heroEm">通用烧录</em></h1>
      <p class="lead" data-t="heroLead">支持任意 bin 文件或 URL · 一键诊断硬件 · 串口终端实时查看</p>
    </div>
  </section>

  <section>
    <div class="section-inner">
      <div class="panels">
        <div class="panel-card">
          <h2 data-t="flashTitle">固件烧录</h2>
          <div class="fw-row">
            <button class="secondary file-btn" onclick="pickFile()" data-t="pickFile">选择固件</button>
            <input type="text" id="fwPath" data-t-placeholder="fwPlaceholder" placeholder="选择 .bin 文件 或 输入固件下载 URL" oninput="onPathChange()">
            <button id="flashBtn" onclick="doFlash()" class="primary" disabled style="min-width:80px" data-t="flashBtn">开始烧录</button>
          </div>
          <input type="file" id="fwFile" accept=".bin" style="display:none" onchange="onFilePicked(event)">

          <div class="progress-track"><span class="fill" id="pbar"></span></div>
          <div id="statusLine" style="font-size:12px;color:var(--muted);margin-bottom:4px" data-t="waiting">等待选择固件...</div>

          <div class="flash-log" id="log"><div style="color:#a0b8d0" data-t="flashLog">日志会显示在这里。</div></div>

          <div class="diag-section">
            <h2 style="font-size:14px;margin-bottom:8px" data-t="diagTitle">诊断硬件</h2>
            <div class="diag-row">
              <button id="diagBtn" onclick="doDiag()" class="diag" data-t="diagBtn">开始诊断</button>
              <button onclick="downloadDiag()" class="secondary" data-t="downloadDiag">下载诊断固件</button>
            </div>
            <div class="diag-sha" id="diagSha">计算 SHA256 中...</div>
            <div style="font-size:12px;color:var(--accent);font-weight:600;margin-top:10px;margin-bottom:2px" data-t="usageTitle">使用说明</div>
            <div style="font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:2px" data-t="usageDesc">点击"开始诊断"后将烧录硬件诊断固件，烧录成功后按以下按键操作：</div>
            <dl style="display:grid;grid-template-columns:auto 1fr;gap:2px 12px;font-size:11px;line-height:1.5;margin-top:4px">
              <dt style="color:var(--accent);font-weight:600" data-t="usage1k">A 键</dt><dd style="color:var(--muted)" data-t="usage1v">重新扫描 I2C 总线，显示检测到的设备</dd>
              <dt style="color:var(--accent);font-weight:600" data-t="usage2k">B 键</dt><dd style="color:var(--muted)" data-t="usage2v">进入 BMI270 六轴传感器实时数据</dd>
            </dl>
          </div>
        </div>

        <div class="panel-card">
          <h2 data-t="serialTitle">串口终端</h2>
          <div class="serial-controls">
            <button id="serialConnectBtn" onclick="serialConnect()" class="primary" data-t="serialConnect">连接设备</button>
            <button id="serialDisconnectBtn" onclick="serialDisconnect()" disabled data-t="serialDisconnect">断开</button>
            <select id="baudRate">
              <option value="115200">115200</option>
              <option value="921600">921600</option>
              <option value="460800">460800</option>
              <option value="230400">230400</option>
            </select>
            <button onclick="serialClear()" class="secondary" data-t="serialClear">清屏</button>
          </div>
          <div class="serial-term" id="serialTerm"></div>
          <div class="serial-input-line">
            <input type="text" id="cmdInput" data-t-placeholder="cmdPlaceholder" placeholder="输入命令后按回车发送..."
                   onkeydown="if(event.key==='Enter')serialSend()">
            <button onclick="serialSend()" data-t="serialSend">发送</button>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>

<footer>
  <div class="section-inner">
    &copy; 2026 whitefirer &middot; StickS3 Toolkit &middot; ESP32-S3 &middot; M5Stack StickS3
  </div>
</footer>

<script type="module">
// ── i18n ───────────────────────────────────
const T = {
  zh: {
    hero:'ESP32-S3 <em>通用烧录</em>', heroEm:'通用烧录',
    heroLead:'支持任意 bin 文件或 URL · 一键诊断硬件 · 串口终端实时查看',
    usageTitle:'使用说明',
    usageDesc:'点击"开始诊断"后将烧录硬件诊断固件，烧录成功后按以下按键操作：',
    usage1k:'A 键', usage1v:'重新扫描 I2C 总线，显示检测到的设备',
    usage2k:'B 键', usage2v:'进入 BMI270 六轴传感器实时数据',
    flashTitle:'固件烧录', pickFile:'选择固件', flashBtn:'开始烧录', flashBtnFlashing:'烧录中...',
    fwPlaceholder:'选择 .bin 文件 或 输入固件下载 URL',
    diagTitle:'诊断硬件', diagBtn:'开始诊断', downloadDiag:'下载诊断固件',
    serialTitle:'串口终端', serialConnect:'连接设备', serialDisconnect:'断开',
    serialClear:'清屏', serialSend:'发送', cmdPlaceholder:'输入命令后按回车发送...',
    flashLog:'日志会显示在这里。', diagSha:'计算 SHA256 中...', diagShaFail:'SHA256: 加载失败',
    waiting:'等待选择固件...', loaded:'已加载', flashDone:'烧录完成', flashFail:'烧录失败',
    loadingFw:'正在加载诊断固件...', connecting:'正在连接设备...', connected:'设备已连接',
    connFail:'连接失败', writing:'正在写入...', done:'设备已重启',
    disconnectSerial:'自动断开串口，准备烧录...', serialDisconnected:'--- 烧录中，自动断开 ---',
    reconnect:'点击重连串口', connectSerial:'连接设备', notConnected:'未连接设备',
    disconnecting:'断开串口连接...'
  },
  en: {
    hero:'ESP32-S3 <em>Flasher</em> &amp; Diagnostics', heroEm:'Flasher',
    heroLead:'Any ESP32-S3 bin file or URL · diagnostics in one click · serial terminal',
    usageTitle:'Usage',
    usageDesc:'Click "Run Diagnostics" to flash the diagnostic firmware. After flashing, use:',
    usage1k:'Button A', usage1v:'Rescan I2C bus, show detected devices',
    usage2k:'Button B', usage2v:'BMI270 6-axis IMU live data',
    flashTitle:'Firmware Flash', pickFile:'Select File', flashBtn:'Start Flash', flashBtnFlashing:'Flashing...',
    fwPlaceholder:'Select .bin file or paste firmware URL',
    diagTitle:'Diagnostics', diagBtn:'Run Diagnostics', downloadDiag:'Download Firmware',
    serialTitle:'Serial Terminal', serialConnect:'Connect', serialDisconnect:'Disconnect',
    serialClear:'Clear', serialSend:'Send', cmdPlaceholder:'Press Enter to send...',
    flashLog:'Log appears here.', diagSha:'Calculating SHA256...', diagShaFail:'SHA256: load failed',
    waiting:'Waiting for firmware...', loaded:'Loaded', flashDone:'Flash complete', flashFail:'Flash failed',
    loadingFw:'Loading diagnostic firmware...', connecting:'Connecting...', connected:'Device connected',
    connFail:'Connection failed', writing:'Writing...', done:'Device rebooted',
    disconnectSerial:'Disconnecting serial for flash...', serialDisconnected:'--- Disconnected for flash ---',
    reconnect:'Click to reconnect', connectSerial:'Connect', notConnected:'Not connected',
    disconnecting:'Disconnecting serial...'
  }
};
let lang = (navigator.language || 'zh').startsWith('zh') ? 'zh' : 'en';
function t(key) { return T[lang][key] || key; }
function applyI18n() {
  document.querySelectorAll('[data-t]').forEach(el => {
    const k = el.getAttribute('data-t');
    if (k === 'hero') el.innerHTML = T[lang][k]; else if (T[lang][k] !== undefined) el.textContent = T[lang][k];
  });
  document.querySelectorAll('[data-t-placeholder]').forEach(el => {
    el.placeholder = T[lang][el.getAttribute('data-t-placeholder')];
  });
  document.getElementById('langBtn').textContent = lang === 'zh' ? 'EN' : '中文';
}
window.toggleLang = function() { lang = lang === 'zh' ? 'en' : 'zh'; applyI18n(); };
applyI18n();

// ── ESptool ───────────────────────────────
import { ESPLoader, Transport } from 'https://unpkg.com/esptool-js@0.6.0/bundle.js';

const DIAG_FW = 'sticks3-toolkit-merged.bin';
let device, transport, fwData = null, fwSource = '';
let flashing = false;
let logFirst = true;
let flashingLabel = '';

function log(msg, cls) {
  const el = document.getElementById('log');
  if (logFirst) { el.innerHTML = ''; logFirst = false; }
  const div = document.createElement('div');
  div.textContent = msg;
  if (cls) div.className = cls;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}
function setProgress(pct, label) {
  document.getElementById('pbar').style.width = pct + '%';
  if (label) setStatus(label);
}
function setStatus(msg) {
  document.getElementById('statusLine').textContent = flashingLabel ? flashingLabel + ' — ' + msg : msg;
}

window.pickFile = function() { document.getElementById('fwFile').click(); };
window.onFilePicked = async function(e) {
  const f = e.target.files[0];
  if (!f) return;
  fwData = await f.arrayBuffer();
  fwSource = 'file';
  document.getElementById('fwPath').value = f.name;
  document.getElementById('flashBtn').disabled = false;
  document.getElementById('diagBtn').disabled = false;
  setStatus(t('loaded') + ': ' + f.name + ' (' + (fwData.byteLength/1024).toFixed(0) + ' KB)');
};
window.onPathChange = function() {
  const v = document.getElementById('fwPath').value.trim();
  document.getElementById('flashBtn').disabled = !v;
  document.getElementById('diagBtn').disabled = !v;
  if (!v) { fwData = null; fwSource = ''; setStatus(t('waiting')); }
};

async function getFirmware(useDiag) {
  if (useDiag) {
    try {
      const r = await fetch(DIAG_FW);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return await r.arrayBuffer();
    } catch(e) { log(t('loadingFw') + ': ' + e.message, 'err'); return null; }
  }
  if (fwSource === 'file') return fwData;
  const path = document.getElementById('fwPath').value.trim();
  if (/^https?:\/\//.test(path)) {
    try {
      const r = await fetch(path);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return await r.arrayBuffer();
    } catch(e) { log('Download failed: ' + e.message, 'err'); return null; }
  }
  return fwData;
}

async function doFlashInternal(data, label, sourceName) {
  flashing = true;
  flashingLabel = sourceName;
  const fb = document.getElementById('flashBtn');
  fb.disabled = true; fb.textContent = t('flashBtnFlashing');
  document.getElementById('diagBtn').disabled = true;
  setProgress(0, '');

  if (serialPort) {
    log(t('disconnectSerial'));
    serialTermWrite(t('serialDisconnected') + '\n');
    await disconnectSerial();
  }

  if (device) {
    try { await transport?.disconnect(); } catch(e) {}
    try { await device.close(); } catch(e) {}
    await new Promise(r => setTimeout(r, 500));
    device = null; transport = null;
  }

  try {
    log(t('connecting'));
    device = await navigator.serial.requestPort();
    transport = new Transport(device);
    log(t('connected'), 'ok');
  } catch(e) {
    log(t('connFail') + ': ' + e.message, 'err');
    resetButtons();
    return;
  }

  try {
    const esploader = new ESPLoader({
      transport, baudrate: 115200,
      terminal: { clean(){}, writeLine(d) { log(d); }, write(d) { log(d); } },
    });
    setProgress(5, t('connecting'));
    const chip = await esploader.main();
    log('Chip: ' + chip, 'ok');
    log(label + ': ' + (data.byteLength/1024).toFixed(0) + ' KB');

    await esploader.writeFlash({
      fileArray: [{ address: 0x0, data: new Uint8Array(data) }],
      flashSize: '8MB', eraseAll: true, compress: true,
      reportProgress: (fi, written, total) => {
        setProgress(Math.round((written / total) * 100), t('writing'));
      },
    });

    setProgress(100, '');
    setStatus(t('flashDone'));
    log(t('flashDone'), 'ok');
    await esploader.after('custom_reset', undefined, 'D0|R1|W100|R0|W500|D0');
    log(t('done'), 'ok');
  } catch(e) {
    log(t('flashFail') + ': ' + e.message, 'err');
    setProgress(0, '');
    setStatus(t('flashFail'));
  }

  try { await transport?.disconnect(); } catch(e) {}
  try { await device?.close(); } catch(e) {}
  device = null; transport = null;
  resetButtons();
  const sbtn = document.getElementById('serialConnectBtn');
  sbtn.textContent = t('reconnect');
  sbtn.classList.add('primary');
  let count = 0;
  const flash = setInterval(() => {
    sbtn.style.boxShadow = (++count % 2) ? '0 0 10px var(--accent)' : '';
    if (count >= 12) { clearInterval(flash); sbtn.style.boxShadow = ''; sbtn.textContent = t('connectSerial'); }
  }, 400);
}

function resetButtons() {
  flashing = false;
  flashingLabel = '';
  const fb = document.getElementById('flashBtn');
  fb.disabled = !document.getElementById('fwPath').value.trim();
  fb.textContent = t('flashBtn');
  document.getElementById('diagBtn').disabled = false;
}

window.doFlash = async function() {
  const path = document.getElementById('fwPath').value.trim();
  if (!path) return;
  if (/^https?:\/\//.test(path)) fwSource = 'url';
  const data = await getFirmware(false);
  if (!data) return;
  const name = fwSource === 'file' ? path.split('/').pop().split('\\').pop() : path;
  await doFlashInternal(data, t('flashTitle'), name);
};

window.doDiag = async function() {
  log(t('loadingFw'));
  const data = await getFirmware(true);
  if (!data) return;
  await doFlashInternal(data, t('diagTitle'), t('diagTitle'));
};

window.downloadDiag = function() {
  const a = document.createElement('a');
  a.href = DIAG_FW; a.download = DIAG_FW; a.click();
};

(async function() {
  try {
    const r = await fetch(DIAG_FW);
    const buf = await r.arrayBuffer();
    const hash = await crypto.subtle.digest('SHA-256', buf);
    const sha = Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
    document.getElementById('diagSha').textContent = 'SHA256: ' + sha;
    document.getElementById('flashBtn').disabled = false;
    document.getElementById('diagBtn').disabled = false;
  } catch(e) {
    document.getElementById('diagSha').textContent = t('diagShaFail');
  }
})();

// ── Serial ────────────────────────────────
let serialPort, serialReader, serialWriter, serialReading = false;

function serialTermWrite(msg) {
  const el = document.getElementById('serialTerm');
  el.textContent += msg;
  el.scrollTop = el.scrollHeight;
}

window.serialConnect = async function() {
  try {
    serialPort = await navigator.serial.requestPort();
    const baud = parseInt(document.getElementById('baudRate').value);
    await serialPort.open({ baudRate: baud });
    serialWriter = serialPort.writable.getWriter();
    serialTermWrite(t('connected') + ' @ ' + baud + ' bps\n');
    document.getElementById('serialConnectBtn').disabled = true;
    document.getElementById('serialDisconnectBtn').disabled = false;
    serialStartRead();
  } catch(e) { serialTermWrite(t('connFail') + ': ' + e.message + '\n'); }
};

async function serialStartRead() {
  serialReading = true;
  const decoder = new TextDecoder();
  try {
    while (serialPort.readable && serialReading) {
      serialReader = serialPort.readable.getReader();
      try {
        while (true) {
          const { value, done } = await serialReader.read();
          if (done) break;
          serialTermWrite(decoder.decode(value, { stream: true }));
        }
      } finally { serialReader.releaseLock(); }
    }
  } catch(e) { if (serialReading) serialTermWrite('\nRead error: ' + e.message + '\n'); }
}

async function disconnectSerial() {
  serialReading = false;
  try { serialReader?.releaseLock(); } catch(e) {}
  try { await serialWriter?.close(); } catch(e) {}
  try { await serialPort?.close(); } catch(e) {}
  serialPort = null;
  document.getElementById('serialConnectBtn').disabled = false;
  document.getElementById('serialDisconnectBtn').disabled = true;
}

window.serialDisconnect = async function() {
  if (serialPort) serialTermWrite('--- ' + t('serialDisconnect') + ' ---\n');
  await disconnectSerial();
};

window.serialSend = async function() {
  const input = document.getElementById('cmdInput');
  const cmd = input.value + '\r\n';
  input.value = '';
  if (!serialWriter) { serialTermWrite(t('notConnected') + '\n'); return; }
  await serialWriter.write(new TextEncoder().encode(cmd));
};

window.serialClear = function() { document.getElementById('serialTerm').textContent = ''; };
</script>
</body>
