name: Build and Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.1
          target: esp32s3
          path: firmware
          command: |
            idf.py build
            mkdir -p ../dist
            cd build
            esptool.py --chip esp32s3 merge_bin -o ../../dist/sticks3-toolkit-merged.bin @flash_args
            cd ../..
            sha256sum dist/sticks3-toolkit-merged.bin

      - name: Fix permissions
        run: sudo chown -R $(id -u):$(id -g) dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/sticks3-toolkit-merged.bin
          body: |
            Automated build from ${{ github.ref_name }}
