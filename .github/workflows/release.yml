name: Build and Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:v5.5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build firmware
        run: |
          set -e
          . /opt/esp/idf/export.sh
          cd firmware
          idf.py build

          # Merge into single binary for web-flash
          mkdir -p ../web-flash
          esptool.py --chip esp32s3 merge_bin \
            -o ../web-flash/sticks3-toolkit-merged.bin \
            --flash_mode dio --flash_size 8MB --flash_freq 80m \
            0x0 build/bootloader/bootloader.bin \
            0x8000 build/partition_table/partition-table.bin \
            0x10000 build/sticks3-toolkit.bin

          cp build/sticks3-toolkit.bin ../web-flash/sticks3-toolkit.bin

          # SHA256 + meta
          SHA256=$(sha256sum ../web-flash/sticks3-toolkit-merged.bin | awk '{print $1}')
          SIZE=$(stat -c%s ../web-flash/sticks3-toolkit-merged.bin)
          VERSION="${GITHUB_REF_NAME:-$(date +%Y%m%d-%H%M)}"

          cat > ../web-flash/fw-meta.json << JSONEOF
          {
            "version": "$VERSION",
            "sha256": "$SHA256",
            "size": $SIZE,
            "url": "sticks3-toolkit-merged.bin"
          }
          JSONEOF

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
        id: build

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: sticks3-toolkit-firmware
          path: |
            web-flash/sticks3-toolkit-merged.bin
            web-flash/sticks3-toolkit.bin
            web-flash/fw-meta.json

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            web-flash/sticks3-toolkit-merged.bin
            web-flash/sticks3-toolkit.bin
            web-flash/fw-meta.json
          body: |
            ## StickS3 Toolkit ${{ steps.build.outputs.version }}

            **SHA256:** `${{ steps.build.outputs.sha256 }}`

            ### Files
            - `sticks3-toolkit-merged.bin` — merged firmware (bootloader + partition table + app)
            - `sticks3-toolkit.bin` — application only
            - `fw-meta.json` — firmware metadata

            ### Flash via Web
            Visit [sticks3-toolkit](https://whitefirer.github.io/sticks3-toolkit/) to flash directly from your browser.
