name: Deploy Pages

on:
  push:
    branches: [master]
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Download latest firmware
        run: |
          curl -sL https://github.com/whitefirer/sticks3-toolkit/releases/latest/download/sticks3-toolkit-merged.bin \
            -o web-flash/sticks3-toolkit-merged.bin || echo "No release firmware yet"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-flash

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
